<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava | AquaWorld</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html"><img src="images/logoo.png" alt="AquaWorld Logo" class="logo"></a>
            <nav><a href="index.html">Nazad na početnu</a></nav>
        </div>
    </header>

    <main class="container">
        <div class="form-box">
            <h1>Dobrodošli nazad</h1>
            <form>
                <div class="form-group">
                    <label>E-mail adresa</label>
                    <input type="text" id="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label>Lozinka</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button onclick="testLogin()" class="btn-aqua">PRIJAVI SE NA NALOG</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #777;">
                Nemate nalog? <a href="#" style="color: #03a9f4; text-decoration: none; font-weight: bold;">Registrujte se</a>
            </p>
        </div>
    </main>
    <footer>
        <p>AquaWorld &copy; 2026 </p>
        <script src="js/main.js"></script>
    </footer>
</body>
</html>
